<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Billing Sys</span>
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" id="tab-btn-market" onclick="switchTab('market')">
                    <span class="nav-icon">🛒</span>
                    <span class="nav-text">Market</span>
                </div>
                <div class="nav-item" id="tab-btn-subs" onclick="switchTab('subs')">
                    <span class="nav-icon">📜</span>
                    <span class="nav-text">My Subscriptions</span>
                </div>
            </nav>
            <div class="sidebar-footer" style="padding: 1rem; border-top: 1px solid #34495e;">
                <div class="nav-item" onclick="logout()">
                    <span class="nav-icon">🚪</span>
                    <span class="nav-text">Logout</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="flex-between" style="background: none; color: #333; padding: 0 0 2rem 0;">
                <h1 id="welcomeMsg" style="margin: 0;">User Dashboard</h1>
                <div class="user-profile" style="display: flex; align-items: center; gap: 0.5rem;">
                    <span id="userName" style="font-weight: bold;">User</span>
                    <div
                        style="width: 40px; height: 40px; background: #3498db; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                        U</div>
                </div>
            </header>

            <!-- Market Tab -->
            <div id="tab-market" class="tab-content active">
                <div class="card">
                    <div class="flex-between" style="margin-bottom: 1.5rem;">
                        <h2 style="margin: 0;">Available Plans</h2>
                        <span style="color: #666;">Explore our best offers</span>
                    </div>
                    <div id="availablePlans"
                        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem;">
                        <!-- Plans injected here -->
                    </div>
                </div>
            </div>

            <!-- Subscriptions Tab -->
            <div id="tab-subs" class="tab-content">
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">My Subscriptions</h2>
                    <div id="mySubs">Loading...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script>
        requireAuth('user');
        const user = getUser();
        document.getElementById('userName').textContent = user.name;
        document.getElementById('welcomeMsg').textContent = `Welcome, ${user.name.split(' ')[0]}!`;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('retracted');
        }

        function switchTab(tabId) {
            // Update Tab Content
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');

            // Update Nav Items
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('tab-btn-' + tabId).classList.add('active');

            // Load data if needed
            if (tabId === 'subs') loadMySubs();
            if (tabId === 'market') loadPlans();
        }

        async function loadMySubs() {
            const container = document.getElementById('mySubs');
            try {
                const res = await fetch(`${API_URL}/subscriptions/?user_id=${user.id}`);
                if (!res.ok) throw new Error(`Failed to fetch subscriptions (${res.status} ${res.statusText})`);
                const subs = await res.json();

                if (subs.length === 0) {
                    container.innerHTML = '<p>No subscriptions yet.</p>';
                    return;
                }

                console.log('Fetched subscriptions:', subs);

                container.innerHTML = `<table>
                    <thead>
                        <tr><th>Plan</th><th>Status</th><th>Renewal Date</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                        ${subs.map(s => {
                    const isPending = s.status === 'pending';
                    const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.plan_name || 'P')}&background=3498db&color=fff`;

                    return `
                                <tr>
                                    <td>
                                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                                            <img src="${s.image_url || fallbackUrl}" 
                                                 onerror="this.src='${fallbackUrl}'"
                                                 style="width: 40px; height: 40px; object-fit: cover; border-radius: 50%; border: 1px solid #eee;">
                                            <strong>${s.plan_name || 'Plan #' + s.id}</strong>
                                        </div>
                                    </td>
                                    <td><span class="status-${s.status}">${s.status.toUpperCase()}</span></td>
                                    <td>${s.renewal_date ? s.renewal_date.split('T')[0] : '-'}</td>
                                    <td>
                                        ${isPending
                            ? `<a href="../payment/checkout.html?sub_id=${s.id}"><button>Pay Now</button></a>`
                            : '<span style="color: #999;">-</span>'}
                                    </td>
                                </tr>`;
                }).join('')}
                    </tbody>
                </table>`;
            } catch (err) {
                container.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
            }
        }

        async function loadPlans() {
            const container = document.getElementById('availablePlans');
            try {
                const res = await fetch(`${API_URL}/plans/`);
                if (!res.ok) throw new Error("Failed to fetch plans");
                const plans = await res.json();

                container.innerHTML = plans.map(p => `
                    <div style="border: 1px solid #eee; padding: 0.5rem; border-radius: 12px; text-align: center; background: #fff; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;" 
                         onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 10px 20px rgba(0,0,0,0.05)'"
                         onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                        <img src="${p.image_url || 'https://via.placeholder.com/150'}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem;">
                        <h3 style="margin: 0.5rem 0; color: #2c3e50;">${p.plan_name}</h3>
                        <p style="font-size: 2rem; font-weight: bold; color: #3498db; margin: 1rem 0;">$${p.price}</p>
                        <p style="color: #666; margin-bottom: 1.5rem;">Duration: ${p.duration_days} Days</p>
                        <button style="width: 100%; padding: 0.8rem;" onclick="subscribe(${p.id})">Subscribe Now</button>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
            }
        }

        async function subscribe(planId) {
            try {
                const res = await fetch(`${API_URL}/subscriptions/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        plan_id: planId
                    })
                });

                if (res.ok) {
                    const sub = await res.json();
                    window.location.href = `../payment/checkout.html?sub_id=${sub.id}`;
                } else {
                    alert("Failed to subscribe");
                }
            } catch (err) {
                alert(err.message);
            }
        }

        // Initial Load
        loadPlans();
    </script>
</body>

</html>
