<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Stellar Billing</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Stellar</span>
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" id="tab-btn-market" onclick="switchTab('market')">
                    <span class="nav-icon">🛒</span>
                    <span class="nav-text">Market</span>
                </div>
                <div class="nav-item" id="tab-btn-subs" onclick="switchTab('subs')">
                    <span class="nav-icon">📜</span>
                    <span class="nav-text">My Subscriptions</span>
                </div>
            </nav>
            <div class="sidebar-footer" style="padding: 1rem; border-top: 1px solid var(--card-border);">
                <div class="nav-item" onclick="logout()">
                    <span class="nav-icon">🚪</span>
                    <span class="nav-text">Logout</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="flex-between" style="margin-bottom: 3rem;">
                <div>
                    <h1 id="welcomeMsg">User Dashboard</h1>
                    <p style="color: var(--text-secondary);">Manage your software & services subscriptions</p>
                </div>
                <div class="user-profile" style="display: flex; align-items: center; gap: 1rem;">
                    <span id="userName" style="font-weight: 600;">User</span>
                    <div
                        style="width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-family: 'Montserrat'; box-shadow: 0 4px 12px var(--accent-glow);">
                        U</div>
                </div>
            </header>

            <!-- Market Tab -->
            <div id="tab-market" class="tab-content active">
                <div class="flex-between" style="margin-bottom: 2rem;">
                    <h2 style="font-size: 1.8rem;">Available Plans</h2>
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">Explore our best offers</span>
                </div>
                <div id="availablePlans"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem;">
                    <!-- Plans injected here -->
                </div>
            </div>

            <!-- Subscriptions Tab -->
            <div id="tab-subs" class="tab-content">
                <div class="card" style="padding: 0;">
                    <div style="padding: 2rem; border-bottom: 1px solid var(--card-border);">
                        <h2 style="margin: 0;">My Subscriptions</h2>
                    </div>
                    <div id="mySubs" style="padding: 1rem;">
                        <p style="padding: 1rem; color: var(--text-secondary);">Loading your subscriptions...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script>
        requireAuth('user');
        const user = getUser();
        document.getElementById('userName').textContent = user.name;
        document.getElementById('welcomeMsg').textContent = `Welcome, ${user.name.split(' ')[0]}!`;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('retracted');
        }

        function switchTab(tabId) {
            // Update Tab Content
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');

            // Update Nav Items
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('tab-btn-' + tabId).classList.add('active');

            // Load data if needed
            if (tabId === 'subs') loadMySubs();
            if (tabId === 'market') loadPlans();
        }

        async function loadMySubs() {
            const container = document.getElementById('mySubs');
            try {
                const res = await fetch(`${API_URL}/subscriptions/?user_id=${user.id}`);
                if (!res.ok) throw new Error(`Failed to fetch subscriptions (${res.status} ${res.statusText})`);
                const subs = await res.json();

                if (subs.length === 0) {
                    container.innerHTML = '<p style="padding: 1rem; color: var(--text-secondary);">No subscriptions yet.</p>';
                    return;
                }

                container.innerHTML = `<table>
                    <thead>
                        <tr><th>Plan</th><th>Status</th><th>Renewal Date</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                        ${subs.map(s => {
                    const isPending = s.status === 'pending';
                    const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.plan_name || 'P')}&background=6366f1&color=fff`;

                    return `
                                <tr>
                                    <td>
                                        <div style="display: flex; align-items: center; gap: 1rem;">
                                            <img src="${s.image_url || fallbackUrl}" 
                                                 onerror="this.src='${fallbackUrl}'"
                                                 style="width: 48px; height: 48px; object-fit: cover; border-radius: 12px; border: 1px solid var(--card-border);">
                                            <strong style="color: white;">${s.plan_name || 'Plan #' + s.id}</strong>
                                        </div>
                                    </td>
                                    <td><span class="status-${s.status}">${s.status.toUpperCase()}</span></td>
                                    <td style="color: var(--text-secondary);">${s.end_date ? s.end_date.split('T')[0] : '-'}</td>
                                    <td>
                                        ${isPending
                            ? `<a href="../payment/checkout.html?sub_id=${s.id}"><button style="padding: 0.5rem 1rem; font-size: 0.85rem;">Pay Now</button></a>`
                            : '<span style="color: rgba(255,255,255,0.2);">Complete</span>'}
                                    </td>
                                </tr>`;
                }).join('')}
                    </tbody>
                </table>`;
            } catch (err) {
                container.innerHTML = `<p style="color:var(--danger); padding: 1rem;">Error: ${err.message}</p>`;
            }
        }

        async function loadPlans() {
            const container = document.getElementById('availablePlans');
            try {
                const res = await fetch(`${API_URL}/plans/`);
                if (!res.ok) throw new Error("Failed to fetch plans");
                const plans = await res.json();

                container.innerHTML = plans.map(p => `
                    <div class="card" style="padding: 1rem; position: relative; overflow: hidden;">
                        <div style="position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; background: var(--accent-glow); filter: blur(40px); opacity: 0.2; z-index: 0;"></div>
                        <img src="${p.image_url || 'https://via.placeholder.com/300'}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 1.5rem; border: 1px solid var(--card-border); position: relative; z-index: 1;">
                        <h3 style="margin: 0.5rem 0; color: white; position: relative; z-index: 1;">${p.plan_name}</h3>
                        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; position: relative; z-index: 1; height: 3.6rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;">${p.description || ''}</p>
                        <div style="display: flex; align-items: baseline; gap: 0.25rem; margin: 1rem 0; position: relative; z-index: 1;">
                            <span style="font-size: 2.5rem; font-weight: 800; color: var(--accent-primary);">₹${p.price}</span>
                            <span style="color: var(--text-secondary); font-size: 0.9rem;"> / ${p.duration_days} Days</span>
                        </div>
                        <button style="width: 100%; margin-top: 1rem; position: relative; z-index: 1;" onclick="subscribe(${p.id})">Subscribe Now</button>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = `<p style="color:var(--danger)">Error: ${err.message}</p>`;
            }
        }

        async function subscribe(planId) {
            try {
                const res = await fetch(`${API_URL}/subscriptions/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        plan_id: planId
                    })
                });

                if (res.ok) {
                    const sub = await res.json();
                    window.location.href = `../payment/checkout.html?sub_id=${sub.id}`;
                } else {
                    alert("Failed to subscribe");
                }
            } catch (err) {
                alert(err.message);
            }
        }

        // Initial Load
        loadPlans();
    </script>
</body>

</html>
