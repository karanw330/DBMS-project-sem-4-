<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .mobile-container {
            width: 100%;
            max-width: 390px;
            height: 100vh;
            max-height: 844px;
            background: white;
            border-radius: 0;
            box-shadow: none;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Tablet and Desktop Styles */
        @media (min-width: 768px) {
            body {
                padding: 20px;
            }

            .mobile-container {
                height: 844px;
                border-radius: 30px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
                overflow-y: auto;
            }

            .status-bar {
                display: none;
            }

            .bottom-indicator {
                display: block;
            }
        }

        /* Mobile Styles */
        @media (max-width: 767px) {
            .mobile-container {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .status-bar {
                display: flex;
                background: white;
            }

            .bottom-indicator {
                display: none;
            }
        }

        /* Small Mobile Screens */
        @media (max-width: 375px) {
            .amount {
                font-size: 48px;
            }

            .logo-container {
                width: 100px;
                height: 100px;
                margin-bottom: 20px;
            }

            .logo {
                width: 50px;
                height: 50px;
            }

            .content {
                padding: 30px 20px;
            }
        }

        /* Large Desktop Screens */
        @media (min-width: 1024px) {
            .mobile-container {
                max-width: 420px;
            }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            height: 44px;
        }

        .time {
            font-size: 15px;
            font-weight: 600;
            color: #000;
        }

        .status-icons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .signal,
        .wifi,
        .battery {
            color: #000;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .close-btn,
        .menu-btn {
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Responsive Header Styles */
        @media (max-width: 767px) {
            .status-bar {
                padding: 10px 15px;
                height: 40px;
            }

            .time {
                font-size: 14px;
            }

            .header {
                padding: 15px;
            }

            .close-btn,
            .menu-btn {
                width: 22px;
                height: 22px;
                font-size: 22px;
            }
        }

        @media (max-width: 375px) {
            .status-bar {
                padding: 8px 12px;
            }

            .header {
                padding: 12px;
            }

            .close-btn,
            .menu-btn {
                width: 20px;
                height: 20px;
                font-size: 20px;
            }
        }

        @media (min-width: 768px) {
            .header {
                padding: 25px;
            }
        }

        .content {
            padding: 40px 20px;
            text-align: center;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .logo {
            width: 60px;
            height: 60px;
        }

        .merchant-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .merchant-upi {
            font-size: 14px;
            color: #999;
            margin-bottom: 40px;
        }

        .amount {
            font-size: 56px;
            font-weight: 700;
            color: #000;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .order-id {
            background: #f0f4ff;
            color: #666;
            font-size: 14px;
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 60px;
        }

        /* Responsive Content Styles */
        @media (max-width: 767px) {
            .content {
                padding: 30px 20px;
            }

            .logo-container {
                width: 100px;
                height: 100px;
                margin-bottom: 25px;
            }

            .logo {
                width: 50px;
                height: 50px;
            }

            .merchant-name {
                font-size: 18px;
            }

            .merchant-upi {
                font-size: 13px;
                margin-bottom: 30px;
            }

            .amount {
                font-size: 48px;
            }

            .order-id {
                font-size: 12px;
                padding: 10px 16px;
                margin-bottom: 40px;
            }
        }

        @media (max-width: 375px) {
            .content {
                padding: 20px 15px;
            }

            .amount {
                font-size: 42px;
            }

            .order-id {
                font-size: 11px;
                padding: 8px 12px;
                margin-bottom: 30px;
            }
        }

        @media (min-width: 768px) {
            .content {
                padding: 30px 30px 20px;
            }

            .logo-container {
                margin-bottom: 25px;
            }

            .merchant-upi {
                margin-bottom: 30px;
            }

            .order-id {
                margin-bottom: 40px;
            }
        }

        .payment-method-section {
            text-align: left;
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .payment-method {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .payment-method:hover {
            border-color: #2d5bff;
            background: #f8f9ff;
        }

        .payment-method-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bank-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e5e5e5;
        }

        .bank-details {
            display: flex;
            flex-direction: column;
        }

        .bank-name {
            font-size: 15px;
            font-weight: 600;
            color: #000;
            margin-bottom: 2px;
        }

        .account-number {
            font-size: 13px;
            color: #999;
        }

        .dropdown-icon {
            font-size: 20px;
            color: #999;
        }

        .pay-button {
            margin: 20px;
            width: calc(100% - 40px);
            padding: 18px;
            background: #2d5bff;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(45, 91, 255, 0.3);
        }

        .pay-button:hover {
            background: #2347dd;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(45, 91, 255, 0.4);
        }

        .pay-button:active {
            transform: translateY(0);
        }

        .powered-by {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 11px;
            color: #999;
            margin-top: 15px;
        }

        /* Responsive Payment Method Styles */
        @media (max-width: 767px) {
            .payment-method-section {
                padding: 0 15px;
                margin-bottom: 20px;
            }

            .section-title {
                font-size: 11px;
                margin-bottom: 12px;
            }

            .payment-method {
                padding: 14px;
            }

            .bank-logo {
                width: 36px;
                height: 36px;
            }

            .bank-name {
                font-size: 14px;
            }

            .account-number {
                font-size: 12px;
            }

            .pay-button {
                margin: 15px;
                width: calc(100% - 30px);
                padding: 16px;
                font-size: 15px;
            }

            .powered-by {
                font-size: 10px;
                margin-top: 10px;
            }
        }

        @media (max-width: 375px) {
            .payment-method-section {
                padding: 0 12px;
            }

            .payment-method {
                padding: 12px;
            }

            .bank-logo {
                width: 32px;
                height: 32px;
            }

            .bank-name {
                font-size: 13px;
            }

            .account-number {
                font-size: 11px;
            }

            .pay-button {
                margin: 12px;
                width: calc(100% - 24px);
                padding: 14px;
                font-size: 14px;
            }
        }

        @media (min-width: 768px) {
            .payment-method-section {
                padding: 0 30px;
                margin-bottom: 25px;
            }

            .payment-method {
                padding: 18px;
            }

            .pay-button {
                margin: 20px 30px;
                width: calc(100% - 60px);
                padding: 18px;
            }

            .powered-by {
                margin-top: 15px;
                padding-bottom: 20px;
            }
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        /* UPI PIN Modal */
        .pin-modal {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .pin-modal {
            transform: scale(1);
        }

        .pin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .pin-title {
            font-size: 14px;
            color: #666;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .show-pin-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #999;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .eye-icon {
            font-size: 18px;
        }

        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 40px;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.2s ease;
        }

        .pin-dot.filled {
            background: #333;
            transform: scale(1.1);
        }

        .pin-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* Success Screen */
        .success-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .success-screen.show {
            display: flex;
            opacity: 1;
        }

        .success-content {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease;
        }

        .success-icon::before {
            content: '✓';
            font-size: 48px;
            color: white;
            font-weight: bold;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .success-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .success-message {
            font-size: 15px;
            color: #999;
            line-height: 1.5;
        }

        /* Responsive Modal Styles */
        @media (max-width: 767px) {
            .pin-modal {
                padding: 30px 20px;
                max-width: 90%;
            }

            .pin-dots {
                gap: 15px;
            }

            .success-icon {
                width: 70px;
                height: 70px;
            }

            .success-icon::before {
                font-size: 40px;
            }

            .success-title {
                font-size: 20px;
            }

            .success-message {
                font-size: 14px;
            }
        }

        @media (max-width: 375px) {
            .pin-modal {
                padding: 25px 15px;
            }

            .pin-title {
                font-size: 12px;
            }

            .show-pin-btn {
                font-size: 11px;
            }

            .pin-dots {
                gap: 12px;
                margin: 20px 0 30px;
            }

            .pin-dot {
                width: 14px;
                height: 14px;
            }

            .success-title {
                font-size: 18px;
            }
        }

        @media (min-width: 768px) {
            .pin-modal {
                padding: 50px 40px;
            }

            .success-content {
                padding: 60px 40px;
            }

            .success-icon {
                width: 100px;
                height: 100px;
            }

            .success-icon::before {
                font-size: 60px;
            }

            .success-title {
                font-size: 26px;
            }

            .success-message {
                font-size: 16px;
            }
        }

        /* Bottom indicator */
        .bottom-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: #000;
            border-radius: 100px;
        }

        /* Doordash Logo SVG */
        .doordash-logo {
            fill: #eb1700;
        }
    </style>
</head>

<body>

            <div class="time">9:41</div>
            <div class="status-icons">
                <span class="signal">📶</span>
                <span class="wifi">📡</span>

    <!-- UPI PIN Modal -->
    <div id="pinModal" class="modal-overlay">
        <div class="pin-modal">
            <div class="pin-header">
                <div class="pin-title">ENTER UPI PIN</div>
                <button class="show-pin-btn" onclick="togglePinVisibility()">
                    <span class="eye-icon">👁</span>
                    <span id="showPinText">SHOW</span>
                </button>
            </div>

            <div class="pin-dots">
                <div class="pin-dot" id="dot1"></div>
                <div class="pin-dot" id="dot2"></div>
                <div class="pin-dot" id="dot3"></div>
                <div class="pin-dot" id="dot4"></div>
            </div>

            <input type="password" id="pinInput" class="pin-input" maxlength="4" pattern="[0-9]*" inputmode="numeric"
                autofocus>
        </div>

    <!-- Success Screen -->
    <div id="successScreen" class="success-screen">
        <div class="success-content">
            <div class="success-icon"></div>
            <div class="success-title">Payment of ₹899 successful!</div>
            <div class="success-message">Your order will arrive in 10 mins, sit tight ;)</div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script>
        // Remove requireAuth('user'); // Allow paying without login (e.g. mobile scan)

        // Parse URL Parameters
        const params = new URLSearchParams(window.location.search);
        const subId = params.get('sub_id');
        let userId = params.get('user_id'); // From QR URL
        const loggedInUser = getUser();

        // Use logged in user ID if available, otherwise from URL
        if (!userId && loggedInUser) userId = loggedInUser.id;

        let subData = null;
        let pinValue = '';
        let showPin = false;

        // Initial Load
        async function initCheckout() {
            if (!subId) {
                alert("Missing subscription ID");
                window.location.href = "../user/dashboard.html";
                return;
            }

            if (!userId) {
                alert("Missing user ID. Please scan the QR code again.");
                return;
            }

            try {
                // Fetch Subscription Details directly
                const res = await fetch(`${API_URL}/subscriptions/${subId}`);
                const subDataResponse = await res.json();
                subData = subDataResponse;

                if (!subData) {
                    alert("Subscription not found");
                    window.location.href = "../user/dashboard.html";
                    return;
                }

                // Update UI
                const price = subData.price || 0;
                document.querySelector('.amount').textContent = `₹${price}`;
                document.querySelector('.pay-button').textContent = `Pay ₹${price}`;
                document.querySelector('.merchant-name').textContent = `Paying ${subData.plan_name || 'Service'}`;
                document.querySelector('.order-id').textContent = `Order Id #${subId}`;
                document.querySelector('.success-title').textContent = `Payment of ₹${price} successful!`;

                // Fetch QR for verification if needed (background)
                const qrRes = await fetch(`${API_URL}/payments/generate-qr?amount=${price}&order_id=${subId}&user_id=${userId}`);
                if (!qrRes.ok) throw new Error(`QR generation failed: ${qrRes.status}`);

                const qrData = await qrRes.json();
                console.log("QR Data (internal):", qrData);

                // Keep the original logo (SVG) as requested
                // (Removed the code that replaced logoContainer.innerHTML)

            } catch (err) {
                console.error("Init Error:", err);
                alert("Error initializing checkout: " + err.message);
            }
        }

        initCheckout();

        function processPayment() {
            const pinModal = document.getElementById('pinModal');
            pinModal.classList.add('show');
            setTimeout(() => { document.getElementById('pinInput').focus(); }, 300);
        }

        document.getElementById('pinInput').addEventListener('input', (e) => {
            pinValue = e.target.value;
            updatePinDots();
            if (pinValue.length === 4) {
                setTimeout(() => { submitPin(); }, 300);
            }
        });

        async function submitPin() {
            const pinModal = document.getElementById('pinModal');

            try {
                const res = await fetch(`${API_URL}/payments/upi-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        subscription_id: parseInt(subId),
                        pin: pinValue
                    })
                });

                if (res.ok) {
                    // Update UI for success
                    document.getElementById('pinModal').classList.remove('show');
                    document.getElementById('successScreen').classList.add('show');

                    // Specific message for polling flow
                    document.querySelector('.success-title').textContent = "Payment Successful!";
                    document.querySelector('.success-message').innerHTML = `
                        Your subscription is now active.<br>
                        <strong>You can close this tab/window.</strong><br>
                        The checkout page on your other device will update automatically.
                    `;
                } else {
                    const error = await res.json();
                    alert(error.detail || "Payment failed");
                    pinValue = '';
                    document.getElementById('pinInput').value = '';
                    updatePinDots();
                }
            } catch (err) {
                alert("Network error: " + err.message);
            }
        }

        function updatePinDots() {
            for (let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i <= pinValue.length) {
                    dot.classList.add('filled');
                    if (showPin && pinValue[i - 1]) {
                        dot.textContent = pinValue[i - 1];
                        dot.style.display = 'flex';
                        dot.style.alignItems = 'center';
                        dot.style.justifyContent = 'center';
                        dot.style.color = 'white';
                        dot.style.background = '#333';
                    } else {
                        dot.textContent = '';
                        dot.style.background = '#333';
                    }
                } else {
                    dot.classList.remove('filled');
                    dot.textContent = '';
                    dot.style.background = '#ddd';
                }
            }
        }

        function togglePinVisibility() {
            showPin = !showPin;
            document.getElementById('showPinText').textContent = showPin ? 'HIDE' : 'SHOW';
            updatePinDots();
        }

        document.querySelector('.close-btn').addEventListener('click', () => {
            if (confirm('Cancel payment?')) window.history.back();
        });
    </script>
</body>

</html>
