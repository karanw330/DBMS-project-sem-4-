<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - Billing System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <div class="card" style="width: 350px;">
        <h2>Login</h2>
        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" required placeholder="user@example.com">

            <label>Password</label>
            <input type="password" id="password" required placeholder="password123">

            <button type="submit" style="width:100%">Login</button>
        </form>
        <p style="text-align:center; margin-top:1rem;">
            No account? <a href="auth/register.html">Register</a>
        </p>
        <div style="margin-top: 1rem; font-size: 0.8rem; color: #666;">
            <strong>Test Accounts:</strong><br>
            Company: admin@techcorp.com / password123<br>
            User: alice@example.com / password123
        </div>
    </div>

    <script src="./config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) throw new Error('Login failed');

                const user = await res.json();
                localStorage.setItem('user', JSON.stringify(user));

                if (user.role === 'company') {
                    window.location.href = 'company/dashboard.html';
                } else {
                    window.location.href = 'user/dashboard.html';
                }
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>

</html>
