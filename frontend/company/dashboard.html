<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Company Dashboard</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Billing Sys</span>
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" id="tab-btn-plans" onclick="switchTab('plans')">
                    <span class="nav-icon">📦</span>
                    <span class="nav-text">My Plans</span>
                </div>
                <div class="nav-item" id="tab-btn-subs" onclick="switchTab('subs')">
                    <span class="nav-icon">👥</span>
                    <span class="nav-text">Recent Subscribers</span>
                </div>
                <div class="nav-item" id="tab-btn-create" onclick="switchTab('create')">
                    <span class="nav-icon">➕</span>
                    <span class="nav-text">Create New Plan</span>
                </div>
            </nav>
            <div class="sidebar-footer" style="padding: 1rem; border-top: 1px solid #34495e;">
                <div class="nav-item" onclick="logout()">
                    <span class="nav-icon">🚪</span>
                    <span class="nav-text">Logout</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="flex-between" style="background: none; color: #333; padding: 0 0 2rem 0;">
                <h1 id="welcomeMsg" style="margin: 0;">Company Dashboard</h1>
                <div class="user-profile" style="display: flex; align-items: center; gap: 0.5rem;">
                    <span id="companyName" style="font-weight: bold;">Company</span>
                    <div
                        style="width: 40px; height: 40px; background: #2c3e50; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                        C</div>
                </div>
            </header>

            <!-- My Plans Tab -->
            <div id="tab-plans" class="tab-content active">
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">My Plans</h2>
                    <table id="plansTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Plan Image</th>
                                <th>Plan Name</th>
                                <th>Price</th>
                                <th>Duration</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Recent Subscribers Tab -->
            <div id="tab-subs" class="tab-content">
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Recent Subscribers</h2>
                    <table id="subsTable">
                        <thead>
                            <tr>
                                <th>Sub ID</th>
                                <th>User ID</th>
                                <th>Plan Name</th>
                                <th>Status</th>
                                <th>Renewal Date</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Create New Plan Tab -->
            <div id="tab-create" class="tab-content">
                <div class="card" style="max-width: 600px;">
                    <h2 style="margin-bottom: 1.5rem;">Create New Plan</h2>
                    <form id="createPlanForm">
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Plan
                                    Name</label>
                                <input type="text" id="planName" required placeholder="e.g. Pro Monthly">
                            </div>
                            <div style="display: flex; gap: 1rem;">
                                <div style="flex: 2;">
                                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Image
                                        URL</label>
                                    <input type="url" id="image_url" placeholder="https://example.com/image.png">
                                </div>
                                <div style="flex: 1;">
                                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Duration
                                        (Days)</label>
                                    <input type="number" id="duration" value="30" required>
                                </div>
                            </div>
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Price
                                    ($)</label>
                                <input type="number" step="0.01" id="price" required placeholder="19.99">
                            </div>
                            <button type="submit" style="padding: 0.8rem; margin-top: 1rem;">Create Plan</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script>
        requireAuth('company');
        const user = getUser();
        document.getElementById('companyName').textContent = user.name;
        document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name.split(' ')[0]}!`;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('retracted');
        }

        function switchTab(tabId) {
            // Update Tab Content
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');

            // Update Nav Items
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('tab-btn-' + tabId).classList.add('active');

            // Load data if needed
            if (tabId === 'plans') loadPlans();
            if (tabId === 'subs') loadSubscribersData();
        }

        // Load Plans
        async function loadPlans() {
            try {
                const res = await fetch(`${API_URL}/plans/?company_id=${user.id}`);
                if (!res.ok) throw new Error(`Failed to fetch plans (${res.status})`);
                const plans = await res.json();

                const tbody = document.querySelector('#plansTable tbody');
                tbody.innerHTML = plans.map(p => `
                    <tr>
                        <td>#${p.id}</td>
                        <td><img src="${p.image_url || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;"></td>
                        <td><strong>${p.plan_name}</strong></td>
                        <td style="color: #3498db; font-weight: bold;">$${p.price}</td>
                        <td>${p.duration_days} Days</td>
                        <td><span class="status-active">ACTIVE</span></td>
                    </tr>
                `).join('');
                return plans;
            } catch (err) {
                console.error(err);
                document.querySelector('#plansTable tbody').innerHTML = `<tr><td colspan="5" style="color:red">Error loading plans: ${err.message}</td></tr>`;
            }
        }

        async function loadSubscribersData() {
            const plans = await loadPlans();
            if (plans) loadSubscribers(plans);
        }

        // Load Subscribers (For all company plans)
        async function loadSubscribers(plans) {
            const tbody = document.querySelector('#subsTable tbody');
            tbody.innerHTML = '';

            for (const plan of plans) {
                try {
                    const res = await fetch(`${API_URL}/subscriptions/?plan_id=${plan.id}`);
                    if (!res.ok) throw new Error(`Failed to fetch subs for plan ${plan.id}`);
                    const subs = await res.json();

                    subs.forEach(s => {
                        const row = `
                            <tr>
                                <td>#${s.id}</td>
                                <td>User #${s.user_id}</td>
                                <td><strong>${plan.plan_name}</strong></td>
                                <td><span class="status-${s.status}">${s.status.toUpperCase()}</span></td>
                                <td>${s.renewal_date ? s.renewal_date.split('T')[0] : 'N/A'}</td>
                            </tr>
                        `;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });
                } catch (err) {
                    console.error(err);
                    tbody.insertAdjacentHTML('beforeend', `<tr><td colspan="5" style="color:red">Error loading subs: ${err.message}</td></tr>`);
                }
            }
        }

        // Create Plan
        document.getElementById('createPlanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const plan_name = document.getElementById('planName').value;
            const price = parseFloat(document.getElementById('price').value);
            const duration_days = parseInt(document.getElementById('duration').value);
            const image_url = document.getElementById('image_url').value;

            try {
                const res = await fetch(`${API_URL}/plans/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        company_id: user.id,
                        plan_name, price, duration_days, image_url
                    })
                });

                if (res.ok) {
                    alert('Plan created successfully!');
                    document.getElementById('createPlanForm').reset();
                    switchTab('plans'); // Go back to plans list
                } else {
                    alert('Failed to create plan');
                }
            } catch (err) {
                alert(err.message);
            }
        });

        // Initial Load
        loadPlans();
    </script>
</body>

</html>
